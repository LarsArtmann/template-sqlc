version: "2"
run:
  timeout: 5m
  go: 1.26.3
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        domain:
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc/internal/domain
            - github.com/google/uuid
          deny:
            - desc: domain layer must not import adapters (hexagonal architecture)
              pkg: github.com/LarsArtmann/template-sqlc/internal/adapters
            - desc: domain layer must not import database layer (hexagonal architecture)
              pkg: github.com/LarsArtmann/template-sqlc/internal/db
          files:
            - internal/domain/**
          list-mode: lax
        main:
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc
            - github.com/google/uuid
            - github.com/jackc/pgx/v5
            - github.com/prometheus/client_golang
          list-mode: lax
        test:
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc
            - github.com/cucumber/godog
            - github.com/stretchr/testify
          files:
            - $test
          list-mode: lax
    exhaustruct:
      exclude:
        - .*AppError
        - .*User$
        - .*UserSession$
        - .*SessionDeviceInfo$
        - .*UserStats$
        - .*SessionStats$
        - .*Metrics$
        - .*MockUserRepository$
        - .*MockSessionRepository$
        - .*NotImplementedUserRepository$
        - .*NotImplementedSessionRepository$
        - .*BaseQueries$
        - .*HTTP.*Server
        - prometheus/.*HistogramOpts
        - prometheus/.*CounterOpts
        - prometheus/.*GaugeOpts
        - promhttp/.*HandlerOpts
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - anon
        - empty
        - error
        - stdlib
        - (or|er)$
        - repositories\.\w+Repository
        - prometheus\.(Histogram|Counter|Gauge)
        - ~.*
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    tagliatelle:
      case:
        rules:
          json: camel
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - fn
        - t
        - i
        - m
        - g
        - a
        - b
        - v
      ignore-type-assert-ok: true
    wrapcheck:
      ignore-package-globs:
        - github.com/LarsArtmann/template-sqlc/internal/adapters/*
        - github.com/LarsArtmann/template-sqlc/internal/domain/entities
      ignore-sigs:
        - github.com/LarsArtmann/template-sqlc/internal/adapters/validation.Validate*
        - github.com/LarsArtmann/template-sqlc/internal/adapters.validation.Validate*
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ListWithPagination
        - github.com/LarsArtmann/template-sqlc/internal/adapters.SearchWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.SearchByTagsWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ChangeStatusWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ChangeRoleWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/domain/entities.StubNotImplemented
        - fmt.Errorf
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - err113
          - exhaustruct
          - funlen
          - gochecknoglobals
          - gosec
          - mnd
          - paralleltest
          - testpackage
          - tparallel
          - varnamelen
      - path: _test\.go
        text: error returned from
        linters:
          - wrapcheck
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - _mock\.go$
      - _templ\.go$
      - internal/db/mysql
      - internal/db/mysql/
      - internal/db/postgres
      - internal/db/postgres/
      - internal/db/sqlite
      - internal/db/sqlite/
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _mock\.go$
      - _templ\.go$
      - internal/db/mysql
      - internal/db/mysql/
      - internal/db/postgres
      - internal/db/postgres/
      - internal/db/sqlite
      - internal/db/sqlite/
issues: {}
