version: "2"
run:
  timeout: 5m
  go: 1.26.1
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    depguard:
      rules:
        domain:
          list-mode: lax
          files:
            - "internal/domain/**"
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc/internal/domain
            - github.com/google/uuid
          deny:
            - pkg: "github.com/LarsArtmann/template-sqlc/internal/adapters"
              desc: "domain layer must not import adapters (hexagonal architecture)"
            - pkg: "github.com/LarsArtmann/template-sqlc/internal/db"
              desc: "domain layer must not import database layer (hexagonal architecture)"
        main:
          list-mode: lax
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc
            - github.com/google/uuid
            - github.com/jackc/pgx/v5
            - github.com/prometheus/client_golang
        test:
          list-mode: lax
          files:
            - "$test"
          allow:
            - $gostd
            - github.com/LarsArtmann/template-sqlc
            - github.com/cucumber/godog
            - github.com/stretchr/testify
    ireturn:
      allow:
        - anon
        - empty
        - error
        - stdlib
        - (or|er)$
        - repositories\.\w+Repository
        - prometheus\.(Histogram|Counter|Gauge)
    tagliatelle:
      case:
        rules:
          json: camel
    wrapcheck:
      ignore-sigs:
        - github.com/LarsArtmann/template-sqlc/internal/adapters/validation.Validate*
        - github.com/LarsArtmann/template-sqlc/internal/adapters.validation.Validate*
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ListWithPagination
        - github.com/LarsArtmann/template-sqlc/internal/adapters.SearchWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.SearchByTagsWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ChangeStatusWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/adapters.ChangeRoleWithValidation
        - github.com/LarsArtmann/template-sqlc/internal/domain/entities.StubNotImplemented
      ignore-package-globs:
        - github.com/LarsArtmann/template-sqlc/internal/adapters/*
        - github.com/LarsArtmann/template-sqlc/internal/domain/entities
    exhaustruct:
      exclude:
        - .*AppError
        - .*User$
        - .*UserSession$
        - .*SessionDeviceInfo$
        - .*UserStats$
        - .*SessionStats$
        - .*Metrics$
        - .*MockUserRepository$
        - .*MockSessionRepository$
        - .*NotImplementedUserRepository$
        - .*NotImplementedSessionRepository$
        - .*BaseQueries$
        - prometheus\.HistogramOpts
        - prometheus\.CounterOpts
        - prometheus\.GaugeOpts
        - promhttp\.HandlerOpts
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - err113
          - exhaustruct
          - funlen
          - gochecknoglobals
          - gosec
          - mnd
          - paralleltest
          - testpackage
          - tparallel
          - varnamelen
      - path: '_test\.go'
        text: "error returned from"
        linters:
          - wrapcheck
    paths:
      - internal/db/mysql
      - internal/db/sqlite
      - internal/db/postgres
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  exclusions:
    paths:
      - internal/db/mysql
      - internal/db/sqlite
      - internal/db/postgres
